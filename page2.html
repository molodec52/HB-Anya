<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поздравление от Ямаля!</title>
    <style>
        /* Базовые настройки страницы — стиль совпадает с первой */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #ffccd5; /* Розовый фон */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Чтобы кубки и медали не ломали прокрутку экрана */
            position: relative;
        }

        /* Контейнер с темно-розовой рамкой */
        .container {
            background-color: #ffffff;
            padding: 40px;
            max-width: 550px;
            width: 85%;
            text-align: center;
            border-radius: 20px;
            border: 5px solid #ff477e; /* Темно-розовая рамка */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 2; /* Чтобы контент был выше летающих на фоне кубков */
        }

        /* Мемная надпись БОЛЬШИМИ буквами */
        .yamal-text {
            font-size: 2.2rem;
            font-weight: 900;
            color: #ff477e;
            text-transform: uppercase; /* Все буквы заглавные */
            line-height: 1.3;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Рамка для фотографии Ламина — теперь идеально ровная */
        .photo-wrapper {
            background: white;
            padding: 12px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            display: inline-block;
            margin-bottom: 35px;
            /* Плавный переход для эффекта увеличения */
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease; 
        }

        /* Эффект при наведении — плавное увеличение и объемная тень */
        .photo-wrapper:hover {
            transform: scale(1.05); /* Увеличение на 5% */
            box-shadow: 0 15px 30px rgba(255, 71, 126, 0.25);
        }

        /* Стили самой картинки */
        .photo-wrapper img {
            max-width: 100%;
            width: 350px;
            height: auto;
            border-radius: 10px;
            display: block;
        }

        /* Блок для кнопок навигации */
        .navigation {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* Круглая кнопка снизу (стиль 1-в-1 с прошлых страниц) */
        .round-button {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 70px;
            height: 70px;
            background-color: #ff477e;
            color: white;
            text-decoration: none; /* Убирает подчеркивание */
            border-radius: 50%; /* Идеально круглая */
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        /* Эффект при наведении на круглую кнопку */
        .round-button:hover {
            background-color: #ff7096;
            transform: scale(1.1);
        }

        /* Кнопка возврата на главную */
        .back-btn {
            display: inline-block;
            color: #ff477e;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #ff7096;
            text-decoration: underline;
        }

        /* Настройка футбольных летающих смайликов */
        .football-emoji {
            position: absolute;
            bottom: -50px;
            user-select: none;
            pointer-events: none;
            animation: floatUpSports 6s linear infinite;
            z-index: 1; /* Летают на фоне за карточкой */
        }

        /* Анимация полета снизу вверх с легким покачиванием и вращением */
        @keyframes floatUpSports {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: translateY(-50vh) translateX(30px) rotate(180deg);
                opacity: 0.9;
            }
            100% {
                transform: translateY(-110vh) translateX(-30px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Набор летающих кубков и медалей с разным временем, задержкой и размерами -->
    <div class="football-emoji" style="left: 6%; animation-delay: 0s; font-size: 26px;">🏆</div>
    <div class="football-emoji" style="left: 16%; animation-delay: 3s; font-size: 32px;">🥇</div>
    <div class="football-emoji" style="left: 26%; animation-delay: 1.5s; font-size: 24px;">🏆</div>
    <div class="football-emoji" style="left: 42%; animation-delay: 4.5s; font-size: 36px;">🥇</div>
    <div class="football-emoji" style="left: 58%; animation-delay: 0.8s; font-size: 28px;">🏆</div>
    <div class="football-emoji" style="left: 72%; animation-delay: 2.2s; font-size: 34px;">🥇</div>
    <div class="football-emoji" style="left: 88%; animation-delay: 3.5s; font-size: 25px;">🏆</div>

    <div class="container">
        <!-- Поздравление -->
        <div class="yamal-text">
            Даже Ламин Ямаль <br> тебя поздравляет!
        </div>

        <!-- Фотография Ламина Ямаля -->
        <div class="photo-wrapper">
            <img src="images.jpg" alt="Ламин Ямаль">
        </div>

        <!-- Блок навигации с кнопками -->
        <div class="navigation">
            <!-- Круглая кнопка, ведущая на page3.html -->
            <a href="page3.html" class="round-button">➜</a>
            
            <!-- Ссылка обратно на главную -->
            <a href="index.html" class="back-btn">← Назад</a>
        </div>
    </div>

</body>
</html>
