<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финал!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #ffccd5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            max-width: 550px;
            width: 85%;
            text-align: center;
            border-radius: 20px;
            border: 5px solid #ff477e;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 2;
        }

        .end-text {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ff477e;
            text-transform: uppercase;
            line-height: 1.3;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .gift-text {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4a4a4a;
            line-height: 1.5;
            margin-bottom: 35px;
        }

        .back-btn {
            display: inline-block;
            color: #ff477e;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #ff7096;
            text-decoration: underline;
        }

        .heart {
            position: absolute;
            bottom: -50px;
            font-size: 24px;
            color: rgba(255, 71, 126, 0.6);
            user-select: none;
            pointer-events: none;
            animation: floatUp 5s linear infinite;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
            50% { transform: translateY(-50vh) translateX(20px) rotate(180deg); opacity: 0.8; }
            100% { transform: translateY(-110vh) translateX(-20px) rotate(360deg); opacity: 0; }
        }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 600px) {
            body {
                min-height: 100vh;
                /* Разрешаем скролл, только если контент не влезает */
                overflow-y: auto; 
                /* Центрируем белую плашку ровно посередине экрана телефона */
                display: flex;
                justify-content: center;
                align-items: center; 
            }

            .container {
                padding: 25px 15px;
                width: 90%;
                max-width: 340px;
                margin: 25px auto;
                box-sizing: border-box;
                height: auto;
            }
            .end-text {
                font-size: 2rem;
                margin-bottom: 15px;
            }
            .gift-text {
                font-size: 1.2rem;
                margin-bottom: 25px;
            }
            .back-btn {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="heart" style="left: 5%; animation-delay: 0s; font-size: 20px;">❤️</div>
    <div class="heart" style="left: 15%; animation-delay: 2s; font-size: 30px;">💖</div>
    <div class="heart" style="left: 30%; animation-delay: 1s; font-size: 25px;">💗</div>
    <div class="heart" style="left: 45%; animation-delay: 3s; font-size: 35px;">❤️</div>
    <div class="heart" style="left: 60%; animation-delay: 0.5s; font-size: 22px;">💕</div>
    <div class="heart" style="left: 75%; animation-delay: 2.5s; font-size: 28px;">💖</div>
    <div class="heart" style="left: 90%; animation-delay: 1.5s; font-size: 32px;">💗</div>

    <div class="container">
        <div class="end-text">На этом всё!</div>
        <div class="gift-text">Но также тебя ждёт подарок <br> уже в лагере... 🎁</div>
        <div class="navigation">
            <a href="page4.html" class="back-btn">← Назад к пожеланиям</a>
        </div>
    </div>

</body>
</html>
